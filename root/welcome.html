<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Atlas WebServer</title>
        <link rel="stylesheet" href="./atlas.css">
    </head>
    <body>
        <div class="shell">
            <section class="hero">
                <p class="eyebrow">Workspace</p>
                <h1>Atlas WebServer 控制台</h1>
                <p>当前登录成功。你可以继续浏览静态展示内容，或者进入文件管理台体验完整的用户、文件与审计链路。</p>
            </section>

            <section class="grid three">
                <article class="card">
                    <p class="kicker">Gallery</p>
                    <h2>看照片</h2>
                    <p class="lead">查看静态图片资源，验证服务端静态文件访问能力。</p>
                    <div class="actions">
                        <form action="5" method="post">
                            <button type="submit">进入照片页</button>
                        </form>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Media</p>
                    <h2>看视频</h2>
                    <p class="lead">查看视频资源，体验静态媒体内容分发页面。</p>
                    <div class="actions">
                        <form action="6" method="post">
                            <button type="submit">进入视频页</button>
                        </form>
                    </div>
                </article>

                <article class="card">
                    <p class="kicker">Files</p>
                    <h2>文件管理台</h2>
                    <p class="lead">进入完整业务模块，体验上传、列表、下载、删除和操作记录。</p>
                    <div class="actions">
                        <form action="files.html" method="get">
                            <button type="submit">打开管理台</button>
                        </form>
                    </div>
                </article>
            </section>
        </div>
    </body>
</html>
